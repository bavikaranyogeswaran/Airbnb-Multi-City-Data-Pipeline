server {
    listen 80;

    root  /usr/share/nginx/html;
    index index.html;

    # ── API reverse proxy ──────────────────────────────────────────────────────
    # Strips the /api prefix before forwarding, matching Vite dev-server
    # behaviour (rewrite: path.replace(/^\/api/, '')).
    # Trailing slash on both sides is what performs the strip in nginx.
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

        # LLM summary endpoints can take up to ~60 s on first call
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── React SPA fallback ─────────────────────────────────────────────────────
    # Any path that is not a real file is served as index.html so that
    # React Router can handle client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ───────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "same-origin"  always;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript;
    gzip_min_length 1024;
}
