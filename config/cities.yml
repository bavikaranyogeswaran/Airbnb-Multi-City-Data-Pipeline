# Inside Airbnb city configuration.
# One entry per city. The pipeline iterates this list.
# Snapshot URLs verified against https://insideairbnb.com/get-the-data/

cities:
  london:
    code: london
    name: London
    country: United Kingdom
    country_code: GB
    currency_code: GBP
    timezone: Europe/London

    source:
      snapshot_date: "2025-09-14"
      base_url: "https://data.insideairbnb.com/united-kingdom/england/london/2025-09-14"

    files:
      listings_detailed:
        name: listings.csv.gz
        url: "https://data.insideairbnb.com/united-kingdom/england/london/2025-09-14/data/listings.csv.gz"
        compressed: true

      calendar:
        name: calendar.csv.gz
        url: "https://data.insideairbnb.com/united-kingdom/england/london/2025-09-14/data/calendar.csv.gz"
        compressed: true

      reviews_detailed:
        name: reviews.csv.gz
        url: "https://data.insideairbnb.com/united-kingdom/england/london/2025-09-14/data/reviews.csv.gz"
        compressed: true

      listings_summary:
        name: listings.csv
        url: "https://data.insideairbnb.com/united-kingdom/england/london/2025-09-14/visualisations/listings.csv"
        compressed: false

      reviews_summary:
        name: reviews.csv
        url: "https://data.insideairbnb.com/united-kingdom/england/london/2025-09-14/visualisations/reviews.csv"
        compressed: false

      neighbourhoods:
        name: neighbourhoods.csv
        url: "https://data.insideairbnb.com/united-kingdom/england/london/2025-09-14/visualisations/neighbourhoods.csv"
        compressed: false

      neighbourhoods_geojson:
        name: neighbourhoods.geojson
        url: "https://data.insideairbnb.com/united-kingdom/england/london/2025-09-14/visualisations/neighbourhoods.geojson"
        compressed: false
